services:
  - type: web
    name: portfolio-contact-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: APP_NAME
        value: Portfolio Contact API
      - key: ADMIN_TOKEN
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.netlify.app
      - key: OWNER_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        value: Thee Joe Techs Website
